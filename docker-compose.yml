services:
  # PostgreSQL database (required)
  postgres:
    image: postgres:16-alpine
    container_name: hesapg-postgres
    environment:
      POSTGRES_USER: hesapg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hesapg}
      POSTGRES_DB: hesapg
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hesapg"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hesapg-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://hesapg:${POSTGRES_PASSWORD:-hesapg}@postgres:5432/hesapg
      - FORECAST_SERVICE_URL=${FORECAST_SERVICE_URL:-}
      - MARKETPLACE_INTEGRATION_SERVICE_URL=${MARKETPLACE_INTEGRATION_SERVICE_URL:-}
      - MARKETPLACE_CREDENTIALS_FERNET_KEY=${MARKETPLACE_CREDENTIALS_FERNET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: Marketplace integration service (placeholder)
  # marketplace-integration:
  #   build:
  #     context: ./backend/marketplace-integration-service
  #     dockerfile: Dockerfile
  #   container_name: hesapg-marketplace
  #   ports:
  #     - "8003:8003"
  #   environment:
  #     - DATABASE_PATH=/data/marketplace.db
  #   volumes:
  #     - marketplace_data:/data
  #   restart: unless-stopped

volumes:
  pg_data:
